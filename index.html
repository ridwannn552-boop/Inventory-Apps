<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory System</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>MENU</h2>
<ul>
<li onclick="showPage('dashboard',this)">Dashboard</li>
<li onclick="showPage('produk',this)">Data Produk</li>
<li onclick="showPage('scanner',this)">Scan</li>
<li onclick="showPage('history',this)">History</li>
</ul>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>

<div class="stats">
<div class="card">
<h3>Total Produk</h3>
<p id="totalProduk">0</p>
</div>

<div class="card">
<h3>Total Masuk</h3>
<p id="totalMasuk">0</p>
</div>

<div class="card">
<h3>Total Keluar</h3>
<p id="totalKeluar">0</p>
</div>
</div>
</div>

<!-- PRODUK -->
<div id="produk" class="page">
<h2>Data Produk</h2>

<input type="text" id="searchInput" placeholder="Cari produk..." onkeyup="searchProduk()">

<table class="produk-table">
<thead>
<tr>
<th>No</th>
<th>Kode</th>
<th>Reff</th>
<th>Nama</th>
<th>UOM</th>
<th>Awal</th>
<th>Masuk</th>
<th>Keluar</th>
<th>Akhir</th>
</tr>
</thead>
<tbody id="dataProduk"></tbody>
</table>

<div id="pagination"></div>
</div>

<!-- SCANNER -->
<div id="scanner" class="page">
<h2>Scan Barcode</h2>

<div class="scanner-container">
<div id="reader"></div>

<p id="hasilScan"></p>

<p>Kode: <b id="scanBarcode">-</b></p>
<p>Nama: <b id="scanNama">-</b></p>

<input type="number" id="qty" placeholder="Input Qty">

<br><br>

<button class="btn-masuk" onclick="setMode('masuk')">Masuk</button>
<button class="btn-keluar" onclick="setMode('keluar')">Keluar</button>
<button class="btn-so" onclick="setMode('so')">Stock Opname</button>

<br><br>

<button onclick="simpanTransaksi()">Simpan</button>
</div>
</div>

<!-- HISTORY -->
<div id="history" class="page">
<h2>History Transaksi</h2>

<div class="search-wrapper">

<select id="filterBulan">
<option value="">Semua Bulan</option>
<option value="1">Jan</option>
<option value="2">Feb</option>
<option value="3">Mar</option>
<option value="4">Apr</option>
<option value="5">Mei</option>
<option value="6">Jun</option>
<option value="7">Jul</option>
<option value="8">Agu</option>
<option value="9">Sep</option>
<option value="10">Okt</option>
<option value="11">Nov</option>
<option value="12">Des</option>
</select>

<select id="filterJenis">
<option value="">Semua</option>
<option value="masuk">Masuk</option>
<option value="keluar">Keluar</option>
<option value="so">SO</option>
</select>

<button onclick="filterHistory()">Filter</button>
<button onclick="resetFilter()">Reset</button>

</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Kode</th>
<th>Reff</th>
<th>Nama</th>
<th>Jenis</th>
<th>Qty</th>
</tr>
</thead>
<tbody id="dataHistory"></tbody>
</table>

</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
