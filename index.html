<!-- DATA PRODUK -->

<div id="produk" class="page">

<h2>Master Data Produk</h2>

<!-- SEARCH BAR -->
<input 
type="text" 
id="searchInput" 
placeholder="Cari Barcode atau Nama Barang..."
onkeyup="searchProduk()"
class="search-box"
>

<table class="produk-table">

<thead>
<tr>
<th>No</th>
<th onclick="sortTable('kode')">Barcode ⬍</th>
<th onclick="sortTable('nama')">Nama Barang ⬍</th>
<th onclick="sortTable('uom')">UOM ⬍</th>
<th onclick="sortTable('awal')">Stock Awal ⬍</th>
<th onclick="sortTable('masuk')">IN ⬍</th>
<th onclick="sortTable('keluar')">OUT ⬍</th>
<th>Stock Akhir</th>
</tr>
</thead>

<tbody id="dataProduk"></tbody>

</table>

<!-- PAGINATION -->
<div id="pagination" class="pagination"></div>

</div>
