<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory App</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<h2>Login</h2>
<input type="text" id="nik" placeholder="NIK">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<!-- APP -->
<div id="mainApp" style="display:none">

<div class="container">

<div class="sidebar">
<ul>
<li onclick="showPage('dashboard')">Dashboard</li>
<li onclick="showPage('scanner')">Scan</li>
<li onclick="showPage('history')">History</li>
<li onclick="logout()">Logout</li>
</ul>
</div>

<div class="content">

<div id="dashboard" class="page active">
<h2>Dashboard</h2>
<canvas id="chart"></canvas>
</div>

<div id="scanner" class="page">
<h2>Scan</h2>
<div id="reader"></div>

<p id="hasilScan"></p>
<p id="scanNama"></p>

<button onclick="setMode('masuk')">Masuk</button>
<button onclick="setMode('keluar')">Keluar</button>
</div>

<div id="history" class="page">
<h2>History</h2>
<p id="totalHistory"></p>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>User</th>
<th>Jenis</th>
<th>Kode</th>
<th>Nama</th>
<th>Qty</th>
</tr>
</thead>
<tbody id="dataHistory"></tbody>
</table>
</div>

</div>
</div>

</div>

<script src="script.js"></script>
<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
