<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory System</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="script.js" defer></script>
</head>
<body>

  <button id="menuToggle" onclick="toggleMenu()">☰</button>

  <div class="container">

    <aside class="sidebar">
      <h2>INVENTORY</h2>
      <ul>
        <li class="active" onclick="showPage('dashboard', this)">Dashboard</li>
        <li onclick="showPage('produk', this)">Data Produk</li>
        <li onclick="showPage('scanner', this)">Scan</li>
        <li onclick="showPage('history', this)">History</li>
      </ul>
    </aside>

    <main class="content">

      <section id="dashboard" class="page active">
        <h2>Dashboard</h2>
        <div class="stats">
          <div class="card">
            <h3>Total Produk</h3>
            <p id="totalProduk">0</p>
          </div>
          <div class="card">
            <h3>Total Masuk</h3>
            <p id="totalMasuk">0</p>
          </div>
          <div class="card">
            <h3>Total Keluar</h3>
            <p id="totalKeluar">0</p>
          </div>
        </div>
      </section>

      <section id="produk" class="page">
        <h2>Data Produk</h2>

        <div class="toolbar">
          <input
            type="text"
            placeholder="Cari kode / nama / reff..."
            id="searchInput"
            onkeyup="searchProduk()"
          />
          <button onclick="refreshMasterData()">Refresh Master</button>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Kode</th>
                <th>Reff</th>
                <th>Nama</th>
                <th>UOM</th>
                <th>Awal</th>
                <th>Masuk</th>
                <th>Keluar</th>
                <th>Akhir</th>
              </tr>
            </thead>
            <tbody id="dataProduk"></tbody>
          </table>
        </div>

        <div id="paginationProduk" class="pagination"></div>
      </section>

      <section id="scanner" class="page">
        <h2>Scan Barcode</h2>

        <div class="scanner-card">
          <div id="reader" class="reader-box"></div>

          <p id="hasilScan">Arahkan barcode ke kamera</p>

          <p>Kode: <b id="scanBarcode">-</b></p>
          <p>Nama: <b id="scanNama">-</b></p>

          <input type="number" id="qty" placeholder="Input Qty" min="1" />

          <div class="scan-actions">
            <button class="btn-masuk" onclick="setMode('masuk')">Masuk</button>
            <button class="btn-keluar" onclick="setMode('keluar')">Keluar</button>
            <button class="btn-so" onclick="setMode('so')">Stock Opname</button>
          </div>

          <button class="btn-simpan" onclick="simpanTransaksi()">Simpan</button>
        </div>
      </section>

      <section id="history" class="page">
        <h2>History Transaksi</h2>

        <div class="filter-bar">
          <select id="filterBulan">
            <option value="">Semua Bulan</option>
            <option value="1">Jan</option>
            <option value="2">Feb</option>
            <option value="3">Mar</option>
            <option value="4">Apr</option>
            <option value="5">Mei</option>
            <option value="6">Jun</option>
            <option value="7">Jul</option>
            <option value="8">Agu</option>
            <option value="9">Sep</option>
            <option value="10">Okt</option>
            <option value="11">Nov</option>
            <option value="12">Des</option>
          </select>

          <select id="filterJenis">
            <option value="">Semua Transaksi</option>
            <option value="masuk">Barang Masuk</option>
            <option value="keluar">Barang Keluar</option>
            <option value="so">Stock Opname</option>
          </select>

          <input
            type="text"
            id="filterKeyword"
            placeholder="Cari barcode / ref / nama..."
            onkeyup="filterHistory()"
          />

          <button onclick="filterHistory()">Filter</button>
          <button onclick="resetFilterHistory()">Reset</button>
          <button onclick="refreshHistoryData()">Refresh History</button>
          <button onclick="downloadExcel()">Download CSV</button>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Kode</th>
                <th>Reff</th>
                <th>Nama</th>
                <th>Jenis</th>
                <th>Qty</th>
              </tr>
            </thead>
            <tbody id="dataHistory"></tbody>
          </table>
        </div>

        <div id="paginationHistory" class="pagination"></div>
      </section>

    </main>
  </div>
</body>
</html>
